<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频生成工具</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{padding:30px;background:#1a1a1a;color:#fff}
        .container{max-width:800px;margin:0 auto}
        h1{margin-bottom:20px;color:#00ff99}
        textarea{width:100%;height:180px;padding:15px;border-radius:8px;background:#2a2a2a;color:#fff;border:1px solid #444;font-size:16px;margin-bottom:15px}
        button{padding:14px 30px;background:#00ff99;color:#000;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold}
        button:hover{opacity:.9}
        #status{margin-top:20px;color:#ccc}
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ AI 文案转视频工具</h1>
        <textarea id="inputText" placeholder="请输入需要转换的中文文案..."></textarea>
        <button onclick="generateVideo()">生成视频</button>
        <div id="status"></div>
    </div>

    <script>
        async function generateVideo(){
            const text = document.getElementById('inputText').value.trim();
            const status = document.getElementById('status');
            if(!text){status.textContent='请输入内容';return;}
            status.textContent='处理中...';
            // 自动适配双平台路径
            let apiPath = '/.netlify/functions/generate';
            if(location.host.includes('vercel.app')){
                apiPath = '/api/generate';
            }
            try{
                const res = await fetch(apiPath,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({text})
                });
                if(!res.ok){
                    throw new Error('HTTP error! status: ' + res.status);
                }
                const data = await res.json();
                status.textContent='✅ 处理完成：'+JSON.stringify(data);
            }catch(e){
                status.textContent='❌ 错误：'+e.message;
            }
        }
    </script>
</body>
</html>
