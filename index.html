<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI文案转英文视频</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#fff;padding:30px;max-width:1000px;margin:auto}
        .box{background:#1e293b;padding:30px;border-radius:16px}
        h2{margin-bottom:20px;color:#38bdf8}
        textarea{width:100%;height:240px;padding:15px;border-radius:10px;background:#334155;color:white;border:none}
        button{padding:15px 30px;background:#2563eb;color:white;border:none;border-radius:10px;margin-top:20px}
    </style>
</head>
<body>
    <div class="box">
        <h2>📹 中文文案 → 英文配音 + 英文字幕视频</h2>
        <textarea id="text" placeholder="输入你的故事..."></textarea>
        <button onclick="go()">生成</button>
        <p id="status" style="margin-top:20px"></p>
    </div>
    <script>
        async function go(){
            const t = document.getElementById('text').value
            document.getElementById('status').innerText = '处理中...'
            const r = await fetch('/api/generate',{method:'POST',body:JSON.stringify({text:t}),headers:{'Content-Type':'application/json'}})
            const d = await r.json()
            document.getElementById('status').innerText = d.code===200?'✅ 成功':'❌ 失败'
        }
    </script>
</body>
</html>
